<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface": "#f8f9ff",
                    "on-error-container": "#93000a",
                    "tertiary-fixed": "#ffdad7",
                    "secondary": "#0058be",
                    "surface-container": "#e5eeff",
                    "primary-fixed": "#6ffbbe",
                    "outline": "#6c7a71",
                    "on-primary-fixed": "#002113",
                    "surface-container-high": "#dce9ff",
                    "secondary-fixed": "#d8e2ff",
                    "primary": "#006c49",
                    "tertiary": "#a43a3a",
                    "secondary-fixed-dim": "#adc6ff",
                    "secondary-container": "#2170e4",
                    "primary-container": "#10b981",
                    "surface-container-highest": "#d3e4fe",
                    "outline-variant": "#bbcabf",
                    "on-tertiary-container": "#711419",
                    "on-error": "#ffffff",
                    "on-primary-fixed-variant": "#005236",
                    "on-primary-container": "#00422b",
                    "on-tertiary-fixed-variant": "#842225",
                    "error": "#ba1a1a",
                    "tertiary-fixed-dim": "#ffb3af",
                    "surface-variant": "#d3e4fe",
                    "surface-bright": "#f8f9ff",
                    "on-background": "#0b1c30",
                    "background": "#f8f9ff",
                    "on-secondary-container": "#fefcff",
                    "inverse-on-surface": "#eaf1ff",
                    "primary-fixed-dim": "#4edea3",
                    "on-secondary": "#ffffff",
                    "on-tertiary": "#ffffff",
                    "on-primary": "#ffffff",
                    "on-tertiary-fixed": "#410005",
                    "tertiary-container": "#fc7c78",
                    "surface-container-lowest": "#ffffff",
                    "inverse-surface": "#213145",
                    "inverse-primary": "#4edea3",
                    "surface-tint": "#006c49",
                    "on-secondary-fixed-variant": "#004395",
                    "surface-container-low": "#eff4ff",
                    "on-secondary-fixed": "#001a42",
                    "on-surface-variant": "#3c4a42",
                    "error-container": "#ffdad6",
                    "surface-dim": "#cbdbf5",
                    "on-surface": "#0b1c30"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        }
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        input:focus, select:focus {
            outline: none !important;
            box-shadow: none !important;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-md flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-4">
<button class="text-emerald-500 hover:bg-slate-100 transition-colors active:scale-95 duration-150 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-xl font-bold tracking-tight text-slate-900 font-headline">Add Product</h1>
</div>
<div class="flex gap-2">
<button class="text-slate-500 hover:bg-slate-100 p-2 rounded-full transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
</button>
</div>
</header>
<main class="pt-24 px-6 max-w-2xl mx-auto space-y-8">
<!-- Image Upload Section -->
<section class="relative group">
<div class="w-full aspect-[16/9] bg-surface-container-low rounded-3xl overflow-hidden flex flex-col items-center justify-center border-2 border-dashed border-outline-variant/30 hover:border-primary/50 transition-all cursor-pointer">
<div class="bg-primary-container/20 p-6 rounded-full mb-4">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="add_a_photo">add_a_photo</span>
</div>
<p class="font-semibold text-on-surface-variant tracking-tight">Add Product Image</p>
<p class="text-sm text-outline mt-1">Recommended: 1200 x 675 px</p>
<!-- Subtle Gradient Overlay -->
<div class="absolute inset-0 bg-gradient-to-t from-primary/5 to-transparent pointer-events-none opacity-0 group-hover:opacity-100 transition-opacity"></div>
</div>
</section>
<!-- Basic Information Card -->
<div class="bg-surface-container-lowest rounded-3xl p-8 space-y-6 shadow-[0_-4px_20px_0_rgba(11,28,48,0.02)]">
<div class="space-y-1">
<h2 class="text-lg font-extrabold text-on-background tracking-tight">Core Details</h2>
<p class="text-sm text-outline">Identify and categorize your new item</p>
</div>
<div class="space-y-4">
<!-- Product Name -->
<div class="space-y-2">
<label class="text-[11px] font-bold uppercase tracking-widest text-outline ml-1">Product Name</label>
<div class="bg-surface-container-high rounded-xl px-4 py-1 transition-all focus-within:bg-surface-container-lowest focus-within:ring-2 focus-within:ring-primary/20">
<input class="w-full bg-transparent border-none py-3 text-on-surface placeholder:text-outline-variant font-medium" placeholder="e.g. Organic Arabica Beans" type="text"/>
</div>
</div>
<!-- Category & SKU Bento-ish Row -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-2">
<label class="text-[11px] font-bold uppercase tracking-widest text-outline ml-1">Category</label>
<div class="bg-surface-container-high rounded-xl px-4 py-1 relative">
<select class="w-full bg-transparent border-none py-3 text-on-surface font-medium appearance-none cursor-pointer">
<option>Select Category</option>
<option>Beverages</option>
<option>Dry Goods</option>
<option>Perishables</option>
<option>Equipment</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-3.5 text-outline pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
<div class="space-y-2">
<label class="text-[11px] font-bold uppercase tracking-widest text-outline ml-1">Barcode / SKU</label>
<div class="flex gap-2">
<div class="flex-1 bg-surface-container-high rounded-xl px-4 py-1 flex items-center">
<input class="w-full bg-transparent border-none py-3 text-on-surface placeholder:text-outline-variant font-medium" placeholder="Scan or enter ID" type="text"/>
</div>
<button class="aspect-square bg-secondary-container text-white rounded-xl flex items-center justify-center px-4 hover:brightness-110 active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="barcode_scanner">barcode_scanner</span>
</button>
</div>
</div>
</div>
</div>
</div>
<!-- Inventory & Pricing Card -->
<div class="bg-surface-container-lowest rounded-3xl p-8 space-y-6 shadow-[0_-4px_20px_0_rgba(11,28,48,0.02)]">
<div class="space-y-1">
<h2 class="text-lg font-extrabold text-on-background tracking-tight">Stock &amp; Pricing</h2>
<p class="text-sm text-outline">Manage quantity and financial margins</p>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Quantity Controller -->
<div class="space-y-2">
<label class="text-[11px] font-bold uppercase tracking-widest text-outline ml-1">Initial Quantity</label>
<div class="bg-surface-container-high rounded-xl p-1 flex items-center justify-between">
<button class="w-10 h-10 flex items-center justify-center bg-white rounded-lg text-primary hover:bg-primary-container/10 transition-colors active:scale-90">
<span class="material-symbols-outlined" data-icon="remove">remove</span>
</button>
<input class="w-full bg-transparent border-none text-center font-bold text-xl text-on-surface [appearance:textfield] [&amp;::-webkit-outer-spin-button]:appearance-none [&amp;::-webkit-inner-spin-button]:appearance-none" type="number" value="0"/>
<button class="w-10 h-10 flex items-center justify-center bg-primary text-white rounded-lg hover:brightness-110 active:scale-90">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
</div>
</div>
<!-- Unit -->
<div class="space-y-2">
<label class="text-[11px] font-bold uppercase tracking-widest text-outline ml-1">Unit of Measure</label>
<div class="bg-surface-container-high rounded-xl px-4 py-1">
<select class="w-full bg-transparent border-none py-3 text-on-surface font-medium appearance-none">
<option>Piece (pc)</option>
<option>Dozen (dz)</option>
<option>Kilogram (kg)</option>
<option>Liter (l)</option>
<option>Box (bx)</option>
</select>
</div>
</div>
<!-- Cost Price -->
<div class="space-y-2">
<label class="text-[11px] font-bold uppercase tracking-widest text-outline ml-1">Cost Price</label>
<div class="bg-surface-container-high rounded-xl px-4 py-1 flex items-center gap-2">
<span class="font-bold text-outline">$</span>
<input class="w-full bg-transparent border-none py-3 text-on-surface font-medium" placeholder="0.00" step="0.01" type="number"/>
</div>
</div>
<!-- Selling Price -->
<div class="space-y-2">
<label class="text-[11px] font-bold uppercase tracking-widest text-outline ml-1">Selling Price</label>
<div class="bg-surface-container-high rounded-xl px-4 py-1 flex items-center gap-2 border-2 border-transparent focus-within:border-primary-container/30">
<span class="font-bold text-primary">$</span>
<input class="w-full bg-transparent border-none py-3 text-on-surface font-bold text-primary" placeholder="0.00" step="0.01" type="number"/>
</div>
</div>
</div>
</div>
<!-- Primary Action -->
<div class="pt-4">
<button class="w-full bg-primary text-on-primary py-5 rounded-2xl font-bold text-lg shadow-lg shadow-primary/20 hover:brightness-110 active:scale-95 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
                Save Product
            </button>
<button class="w-full mt-4 text-outline font-medium py-3 hover:text-on-surface transition-colors">
                Cancel and discard changes
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 bg-white shadow-[0_-4px_20px_0_rgba(11,28,48,0.04)] rounded-t-2xl">
<a class="flex flex-col items-center justify-center bg-emerald-100 text-emerald-700 rounded-2xl px-5 py-2 active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="inventory_2" style="font-variation-settings: 'FILL' 1;">inventory_2</span>
<span class="text-[11px] font-medium tracking-wide">Inventory</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 py-2 hover:bg-slate-50 active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="barcode_scanner">barcode_scanner</span>
<span class="text-[11px] font-medium tracking-wide">Scanner</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 py-2 hover:bg-slate-50 active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span>
<span class="text-[11px] font-medium tracking-wide">Analytics</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 py-2 hover:bg-slate-50 active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="text-[11px] font-medium tracking-wide">Settings</span>
</a>
</nav>
</body></html>
